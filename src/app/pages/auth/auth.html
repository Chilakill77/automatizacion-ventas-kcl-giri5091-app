<div class="row justify-content-md-center p-5">
  <div class="col col-lg-4 bg-info">
    <mat-card appearance="outlined">
      <mat-card-header>
        <mat-card-title>
          Inicia sesion
        </mat-card-title>
      </mat-card-header>
      <mat-card-content>
        <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
          <mat-form-field class="full-width pt-2" appearance="outline">
            <mat-label>Usuario</mat-label>
            <input matInput formControlName="username" />
            <mat-error>
              {{ baseForm.getErrorMessage(loginForm.get('username')) }}
            </mat-error>
          </mat-form-field>

          <mat-form-field class="full-width" appearance="outline">
            <mat-label>Contraseña</mat-label>
            <input
              [type]="hide ? 'password' : 'text'"
              matInput
              formControlName="password"
            />
            <button
              mat-icon-button
              matSuffix
              type="button"
              (click)="hide = !hide"
            >
              <mat-icon>{{ hide ? 'visibility_off' : 'visibility' }}</mat-icon>
            </button>
          </mat-form-field>

          <button type="submit" class="full-width" mat-raised-button color="primary">
            Acceder
          </button>
          <button type="button" class="full-width mt-2" mat-button>
            ¿Olvidaste tu contraseña?
          </button>
        </form>
      </mat-card-content>
    </mat-card>
  </div>
</div>
